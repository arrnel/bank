services:

  postgres:
    container_name: bank-db
    image: postgres:16.8
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - CREATE_DATABASES=currency-service,payment-service
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: postgres -c max_connections=200 -c max_prepared_transactions=100
    volumes:
      - ./env/docker/postgres/init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}", "-d", "postgres" ]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - bank-network
  
  redis:
    container_name: redis
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --requirepass redis

  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.3.2
    restart: unless-stopped
    expose:
      - 2181
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - bank-network

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.3.2
    restart: unless-stopped
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - bank-network

  currency.bank.dc:
    container_name: currency.bank.dc
    image: ${IMAGE_PREFIX}/currency-service-docker:latest
    ports:
      - "8091:8091"
    restart: unless-stopped
    environment:
      - CURRENCY_FREAKS_API_KEY=${CURRENCY_FREAKS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: wget --spider http://localhost:8091/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - bank-network

  payment.bank.dc:
    container_name: payment.bank.dc
    image: ${IMAGE_PREFIX}/payment-service-docker:latest
    ports:
      - "8092:8092"
    restart: unless-stopped
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: wget --spider http://localhost:8092/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - bank-network

  gateway.bank.dc:
    container_name: gateway.bank.dc
    image: ${IMAGE_PREFIX}/gateway-service-docker:latest
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test: wget --spider http://localhost:8090/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bank-network

  bank-tests:
    container_name: bank-tests
    image: ${IMAGE_PREFIX}/bank-tests:latest
    build:
      context: ./
      dockerfile: ./tests/Dockerfile
    environment:
      - TEST_ENV=docker
      - TAG_EXPR=${TAG_EXPR:-}
      - TEST_ARGS=${TEST_ARGS:-}
    volumes:
      - ./allure-results:/bank/tests/build/allure-results
    depends_on:
      gateway.bank.dc:
        condition: service_healthy
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge