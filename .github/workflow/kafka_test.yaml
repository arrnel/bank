name: Kafka test run

on:
  workflow_dispatch:
    inputs:
      TEST_TITLE:
        description: Test Run Title. Will added in Allure Report Title
        type: string
        required: false
        default: ""

jobs:
  test-run:
    runs-on: ubuntu-latest
    env:
      TEST_ENV: docker
      WORKFLOW_REPORT_ID: kafka_test
      CURRENCY_FREAKS_API_KEY: ${{ secrets.CURRENCY_FREAKS_API_KEY }}
      TAG_EXPR: ${{ vars.TAG_EXPR_KAFKA }}
      TEST_ARGS: ${{ vars.TEST_ARGS }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GITHUB_SHA }}

      - name: Set TEST_TITLE
        uses: ./.github/actions/test-run-title
        with:
          test_title: ${{ inputs.TEST_TITLE }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build backends
        run: |
          ./gradlew jibDockerBuild -x :tests:test

      - name: Run Kafka tests
        uses: ./.github/actions/run-tests
        if: always()
        continue-on-error: true

      - name: Generate and Deploy Allure Report in GitHub Pages
        uses: ./.github/actions/generate-and-deploy-allure-report
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          subfolder: ${{ env.WORKFLOW_REPORT_ID }}
          report_name: ${{ env.TEST_TITLE }}
          allure_results_path: allure-results
          allure_history_path: allure-history
          report_branch: gh-pages
